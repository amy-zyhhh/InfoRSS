---
layout: default
---

<article class="brief-page raw-page">
  <header class="page-header">
    <p class="eyebrow">{{ page.date_range }}</p>
    <h1>{{ page.title }}</h1>
    <p>{{ page.published_at }}</p>
    {% if page.source_url %}
      <p><a href="{{ page.source_url }}" target="_blank" rel="noopener">打开原网页</a></p>
    {% endif %}
  </header>

  <div class="prose raw-content">
    {{ content }}
  </div>
</article>
