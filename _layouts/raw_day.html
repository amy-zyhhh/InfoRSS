---
layout: default
---

<article class="brief-page raw-page">
  <header class="page-header">
    <p class="eyebrow">{{ page.date_range }}</p>
    <h1>{{ page.title }}</h1>
    <p>{{ page.items_count | default: 0 }} 条已抓取原文</p>
  </header>

  <div class="prose">
    {{ content }}
  </div>
</article>
