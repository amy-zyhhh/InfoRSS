<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav>
        <a href="{{ '/' | relative_url }}">首页</a>
        <a href="{{ '/search/' | relative_url }}">搜索</a>
        <a href="{{ '/archive/' | relative_url }}">归档</a>
      </nav>
    </header>

    <main class="site-main">
      {{ content }}
    </main>

    <footer class="site-footer">
      <span>由 InfoRSS 生成</span>
    </footer>
    <script src="{{ '/assets/js/external-links.js' | relative_url }}?v={{ site.time | date: '%s' }}" defer></script>
  </body>
</html>
