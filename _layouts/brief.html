---
layout: default
---

<article class="brief-page">
  <header class="page-header">
    <p class="eyebrow">{{ page.date_range }}</p>
    <h1>{{ page.title }}</h1>
    <p>{{ page.items_count | default: 0 }} 条通知{% if page.generated_at %}，生成于 {{ page.generated_at }}{% endif %}</p>
  </header>

  <div class="prose">
    {{ content }}
  </div>
</article>

<script>
  window.INFO_RSS_SEARCH_INDEX = "{{ '/assets/search-index.json' | relative_url }}";
  window.INFO_RSS_BASE_URL = "{{ '/' | relative_url }}";
</script>
<script src="{{ '/assets/js/brief-raw-links.js' | relative_url }}?v={{ site.time | date: '%s' }}" defer></script>
