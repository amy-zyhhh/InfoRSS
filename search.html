---
layout: default
title: 搜索
permalink: /search/
---

<section class="page-header">
  <h1>搜索</h1>
  <p>按关键词、类别、适用对象和发布时间筛选已整理的通知。</p>
</section>

<section class="section">
  <div class="section-heading">
    <h2>检索通知</h2>
    <span id="result-count" class="muted">正在载入</span>
  </div>

  <div class="filters" aria-label="通知筛选">
    <label>
      <span>搜索</span>
      <input id="search-input" type="search" placeholder="搜索标题、摘要、关键词">
    </label>
    <div class="check-filter">
      <span>全文</span>
      <label>
        <input id="fulltext-filter" type="checkbox">
        <span>搜索已抓取原文</span>
      </label>
    </div>
    <label>
      <span>类别</span>
      <select id="category-filter">
        <option value="">全部类别</option>
      </select>
    </label>
    <label>
      <span>适用对象</span>
      <select id="audience-filter">
        <option value="">全部对象</option>
      </select>
    </label>
    <label>
      <span>开始日期</span>
      <input id="date-start" type="date">
    </label>
    <label>
      <span>结束日期</span>
      <input id="date-end" type="date">
    </label>
    <button id="reset-filters" type="button">重置</button>
  </div>

  <div id="search-results" class="notice-list" aria-live="polite">
    <p class="empty">正在读取搜索索引。</p>
  </div>
</section>

<script>
  window.INFO_RSS_SEARCH_INDEX = "{{ '/assets/search-index.json' | relative_url }}";
  window.INFO_RSS_BASE_URL = "{{ '/' | relative_url }}";
</script>
<script src="{{ '/assets/js/search.js' | relative_url }}" defer></script>
