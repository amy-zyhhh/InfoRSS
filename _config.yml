title: 清华信息门户摘要
description: RSS 抓取与 AI 整理后的清华信息门户通知归档
lang: zh-CN
timezone: Asia/Shanghai
notice_alert_threshold: 90

markdown: kramdown
permalink: pretty

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - data
  - scripts
  - vendor
  - .env

defaults:
  - scope:
      path: "content/briefs"
    values:
      layout: brief
  - scope:
      path: "content/daily"
    values:
      layout: brief
      raw_archive: true
