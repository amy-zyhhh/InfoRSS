name: Daily InfoRSS Update

on:
  schedule:
    # 03:00 Asia/Shanghai = 19:00 UTC on the previous day.
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Write runtime environment
        shell: bash
        run: |
          cat > .env <<'EOF'
          INFORS_RSS_URL=${{ secrets.INFORS_RSS_URL }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL=${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL=${{ secrets.OPENAI_MODEL }}
          EOF

      - name: Run daily pipeline
        run: python scripts/run_all.py

      - name: Commit generated content
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/briefs content/raw assets/search-index.json
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Update daily info brief"
            git push
          fi
